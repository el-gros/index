<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Visor de Ruta - PasoApp</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background-color: #121212; overflow: hidden; }
    #map { width: 100vw; height: 100vh; position: absolute; }
    #info-card {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 24px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      padding: 20px; box-sizing: border-box; display: none; z-index: 1000;
    }
    .title { font-size: 1.1rem; font-weight: 800; color: #1a1a1a; margin: 0 0 15px 0; text-align: center; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 16px; text-align: center; }
    .stat-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: #999; display: block; margin-bottom: 2px; }
    .stat-val { font-size: 1.1rem; font-weight: 700; color: #ff3b30; } /* ROJO */
    .stat-unit { font-size: 0.7rem; color: #999; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 600; background: white; padding: 15px 25px; border-radius: 30px; z-index: 2000; }
  </style>
</head>
<body>
  <div id="loading">🛰️ Localizando ruta...</div>
  <div id="map"></div>
  <div id="info-card">
    <h2 class="title" id="r-name">Cargando...</h2>
    <div class="stats-grid">
      <div class="stat-box"><span class="stat-label">Distancia</span><span class="stat-val"><span id="r-dist">--</span> <span class="stat-unit">km</span></span></div>
      <div class="stat-box"><span class="stat-label">Tiempo</span><span class="stat-val" id="r-time">--</span></div>
      <div class="stat-box"><span class="stat-label">Desnivel +</span><span class="stat-val"><span id="r-gain">--</span> <span class="stat-unit">m</span></span></div>
      <div class="stat-box"><span class="stat-label">Desnivel -</span><span class="stat-val"><span id="r-loss">--</span> <span class="stat-unit">m</span></span></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
  <script>
    ol.proj.useGeographic();
    const SUPABASE_URL = 'https://xvezdemtphqwgjukjhan.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2ZXpkZW10cGhxd2dqdWtqaGFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI4OTQxMTYsImV4cCI6MjA3ODQ3MDExNn0.ayOgM2MIXJiW_q4AbAyQ4KzgiiNEF5o7sQLr2d_oX1E';

function formatTime(s) {
      if (!s) return '--';
      if (s > 200000) s = Math.floor(s / 1000); // Corrección milisegundos
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      return h > 0 ? `${h}h ${m}m` : `${m}min`;
    }

    async function init() {
      const routeId = new URLSearchParams(window.location.search).get('id');
      if (!routeId) return;

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/shared_routes?id=eq.${routeId}&select=*`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Accept': 'application/geo+json' }
        });
        const data = await response.json();
        const features = new ol.format.GeoJSON().readFeatures(data);
        const feature = features[0];
        const p = feature.getProperties();

        // Asignación de datos con corrección de unidades
        document.getElementById('r-name').innerText = p.name || 'Ruta';
        const d = p.stats?.distance || 0;
        document.getElementById('r-dist').innerText = (d > 100 ? d / 1000 : d).toFixed(2);
        document.getElementById('r-time').innerText = formatTime(p.stats?.time);
        document.getElementById('r-gain').innerText = Math.round(p.stats?.elevationGain || 0);
        document.getElementById('r-loss').innerText = Math.round(p.stats?.elevationLoss || 0);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('info-card').style.display = 'block';

        const map = new ol.Map({
          target: 'map',
          layers: [new ol.layer.Tile({ source: new ol.source.OSM() })],
          view: new ol.View({ center: [0, 0], zoom: 2 }),
          controls: []
        });

        feature.setStyle(new ol.style.Style({
          stroke: new ol.style.Stroke({ color: '#ff3b30', width: 5, lineCap: 'round' })
        }));

        const source = new ol.source.Vector({ features: [feature] });
        map.addLayer(new ol.layer.Vector({ source }));
        map.getView().fit(source.getExtent(), { padding: [50, 50, 250, 50], duration: 1000 });

      } catch (e) { console.error(e); }
    }
    init();
  </script>
</body>
</html>
