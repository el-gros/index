<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PasoApp - Ruta Compartida</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: 'Inter', sans-serif;
      background-color: #f4f4f4;
      overflow: hidden;
    }

    #map { width: 100vw; height: 100vh; }

    /* Tarjeta flotante tipo Glassmorphism (Estilo de tu app) */
    #info-card {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
      padding: 20px;
      box-sizing: border-box;
      display: none; /* Oculto hasta que carguen los datos */
      z-index: 1000;
    }

    .title { font-size: 1.1rem; font-weight: 800; color: #333; margin: 0 0 5px 0; }
    .desc { font-size: 0.85rem; color: #666; margin: 0 0 15px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box { background: rgba(0,0,0,0.03); padding: 10px; border-radius: 12px; }
    .stat-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #888; display: block; margin-bottom: 2px;}
    .stat-val { font-size: 0.95rem; font-weight: 600; color: #222; font-family: monospace; }
    .stat-val span { font-size: 0.7rem; color: #888; font-weight: 400; }

    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-weight: 600; color: #333; background: white; padding: 10px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 2000;
    }
  </style>
</head>
<body>

  <div id="loading">Cargando ruta...</div>

  <div id="map"></div>

  <div id="info-card">
    <h2 class="title" id="r-name">Ruta</h2>
    <p class="desc" id="r-desc"></p>
    
    <div class="stats-grid">
      <div class="stat-box">
        <span class="stat-label">Distancia</span>
        <span class="stat-val" id="r-dist">0 <span>km</span></span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Desnivel</span>
        <span class="stat-val" id="r-ele">+0 <span>m</span></span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>

  <script>
    // --- 1. CONFIGURACIÓN SUPABASE ---
    const SUPABASE_KEY = 'TU_ANON_KEY_DE_SUPABASE_AQUI';
    const SUPABASE_URL = 'https://xvezdemtphqwgjukjhan.supabase.co',
    const SUPABASE_URL = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2ZXpkZW10cGhxd2dqdWtqaGFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI4OTQxMTYsImV4cCI6MjA3ODQ3MDExNn0.ayOgM2MIXJiW_q4AbAyQ4KzgiiNEF5o7sQLr2d_oX1E',


    // Función para formatear el tiempo (Milisegundos a HH:MM)
    function formatTime(ms) {
      if (!ms) return '--:--';
      const totalMin = Math.floor(ms / 60000);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      return `${h}h ${m.toString().padStart(2, '0')}m`;
    }

    async function init() {
      // 2. Extraer el ID de la ruta de la URL (ej: index.html?id=1234-abcd-...)
      const params = new URLSearchParams(window.location.search);
      const routeId = params.get('id');

      if (!routeId) {
        document.getElementById('loading').innerText = 'Error: No se encontró la ruta en el enlace.';
        return;
      }

      try {
        // 3. Consultar a Supabase mediante su API REST (Súper ligero)
        const response = await fetch(`${SUPABASE_URL}/rest/v1/shared_routes?id=eq.${routeId}&select=name,description,track_line,stats`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        const data = await response.json();

        if (!data || data.length === 0) {
          document.getElementById('loading').innerText = 'La ruta ha caducado o no existe.';
          return;
        }

        const route = data[0];

        // 4. Pintar Datos en la Interfaz
        document.getElementById('r-name').innerText = route.name;
        document.getElementById('r-desc').innerText = route.description || 'Sin descripción';
        
        if (route.stats) {
          const distKm = route.stats.distance ? (route.stats.distance).toFixed(2) : '0';
          const eleGain = route.stats.elevationGain ? Math.round(route.stats.elevationGain) : '0';
          
          document.getElementById('r-dist').innerHTML = `${distKm} <span>km</span>`;
          document.getElementById('r-ele').innerHTML = `+${eleGain} <span>m</span>`;
        }

        // Mostrar la tarjeta y ocultar el loading
        document.getElementById('info-card').style.display = 'block';
        document.getElementById('loading').style.display = 'none';

        // 5. Configurar OpenLayers
        // Convertimos el WKT (Well-Known Text) de PostGIS a formato EPSG:3857 (Mercator, estándar web)
        const format = new ol.format.WKT();
        const feature = format.readFeature(route.track_line, {
          dataProjection: 'EPSG:4326', // GPS estándar
          featureProjection: 'EPSG:3857' // Mapa web
        });

        // Aplicamos el estilo de línea verde de PasoApp
        feature.setStyle(new ol.style.Style({
          stroke: new ol.style.Stroke({ color: '#2dd36f', width: 5 })
        }));

        const vectorSource = new ol.source.Vector({ features: [feature] });
        const vectorLayer = new ol.layer.Vector({ source: vectorSource });

        // Inicializamos el mapa con el estilo de OSM
        const map = new ol.Map({
          target: 'map',
          layers: [
            new ol.layer.Tile({ source: new ol.source.OSM() }),
            vectorLayer
          ],
          view: new ol.View({ center: [0, 0], zoom: 2 }),
          controls: [] // Quitamos los controles de zoom para que se vea más limpio en móvil
        });

        // 6. Hacer zoom a la ruta añadiendo un margen padding para que no se pegue a los bordes
        map.getView().fit(vectorSource.getExtent(), {
          padding: [80, 50, 200, 50], // Más padding abajo para la tarjeta flotante
          duration: 1000
        });

      } catch (error) {
        console.error('Error cargando la ruta:', error);
        document.getElementById('loading').innerText = 'Error de conexión.';
      }
    }

    // Arrancar la magia
    init();
  </script>
</body>
</html>
