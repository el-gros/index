<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor de Ruta - PasoApp</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, sans-serif; background: #121212; overflow: hidden; }
        #map { width: 100vw; height: 100vh; position: absolute; }
        
        /* Estilo tipo App */
        #status-box { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 25px; border-radius: 24px; z-index: 100; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); width: 80%; max-width: 300px;
        }
        #info-card { 
            position: absolute; bottom: 30px; left: 15px; right: 15px; 
            background: rgba(255,255,255,0.95); padding: 20px; border-radius: 24px; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: none; z-index: 50; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .route-title { font-size: 1.2rem; font-weight: 800; color: #1a1a1a; margin: 0 0 10px 0; }
        .stats { display: flex; justify-content: space-around; border-top: 1px solid #eee; padding-top: 15px; }
        .stat-item { text-align: center; }
        .stat-label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: 700; }
        .stat-val { font-size: 1.1rem; font-weight: 700; color: #2dd36f; }
    </style>
</head>
<body>

    <div id="status-box">
        <div id="status-text">🛰️ Conectando con Supabase...</div>
    </div>

    <div id="map"></div>

    <div id="info-card">
        <h2 id="route-name" class="route-title">Ruta</h2>
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">Distancia</span>
                <span class="stat-val"><span id="route-dist">0</span> km</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Desnivel</span>
                <span class="stat-val">+<span id="route-ele">0</span> m</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    <script>
        // 🚀 CONFIGURACIÓN OBLIGATORIA
        // Según tu log, tu URL es: https://xvezdemtphqwgjukjhan.supabase.co
        const SUPABASE_PROJECT_URL = 'https://xvezdemtphqwgjukjhan.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2ZXpkZW10cGhxd2dqdWtqaGFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI4OTQxMTYsImV4cCI6MjA3ODQ3MDExNn0.ayOgM2MIXJiW_q4AbAyQ4KzgiiNEF5o7sQLr2d_oX1E'; // El churro que empieza por eyJ...

        async function initVisor() {
            const urlParams = new URLSearchParams(window.location.search);
            const routeId = urlParams.get('id');
            const status = document.getElementById('status-text');

            if (!routeId) {
                status.innerHTML = "❌ Error: Enlace inválido.<br><small>Falta el ID de la ruta.</small>";
                return;
            }

            try {
                // 1. Llamada a la cocina (Supabase)
                const endpoint = `${SUPABASE_PROJECT_URL}/rest/v1/shared_routes?id=eq.${routeId}&select=*`;
                
                const response = await fetch(endpoint, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY.trim(),
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY.trim()}`,
                        'Accept': 'application/geo+json', // Formato mapa
                        'Prefer': 'plurality=singular'   // Objeto directo
                    }
                });

                if (!response.ok) throw new Error(`Status ${response.status}`);

                const data = await response.json();
                if (!data) throw new Error("Ruta no encontrada");

                // 2. Rellenar Interfaz
                document.getElementById('route-name').innerText = data.name || 'Ruta compartida';
                document.getElementById('route-dist').innerText = data.stats.distance.toFixed(2);
                document.getElementById('route-ele').innerText = Math.round(data.stats.elevationGain);
                
                document.getElementById('status-box').style.display = 'none';
                document.getElementById('info-card').style.display = 'block';

                // 3. Dibujar Mapa con OpenLayers
                const map = new ol.Map({
                    target: 'map',
                    layers: [
                        new ol.layer.Tile({ source: new ol.source.OSM() })
                    ],
                    view: new ol.View({ center: [0, 0], zoom: 2 }),
                    controls: []
                });

                const feature = new ol.format.GeoJSON().readFeature(data.track_line, {
                    dataProjection: 'EPSG:4326',
                    featureProjection: 'EPSG:3857'
                });

                feature.setStyle(new ol.style.Style({
                    stroke: new ol.style.Stroke({ color: '#2dd36f', width: 6 })
                }));

                const source = new ol.source.Vector({ features: [feature] });
                map.addLayer(new ol.layer.Vector({ source }));

                // Auto-zoom a la ruta
                map.getView().fit(source.getExtent(), { 
                    padding: [40, 40, 180, 40], 
                    duration: 1000 
                });

            } catch (err) {
                status.innerHTML = `⚠️ Error al cargar:<br><small>${err.message}</small>`;
                console.error("Detalle:", err);
            }
        }

        initVisor();
    </script>
</body>
</html>
