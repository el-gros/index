<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <title>PasoApp - Ruta Compartida</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: 'Inter', sans-serif;
      background-color: #f4f4f4;
      overflow: hidden;
    }

    #map { width: 100vw; height: 100vh; }

    /* Tarjeta flotante tipo Glassmorphism (Estilo de tu app) */
    #info-card {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
      padding: 20px;
      box-sizing: border-box;
      display: none; /* Oculto hasta que carguen los datos */
      z-index: 1000;
    }

    .title { font-size: 1.1rem; font-weight: 800; color: #333; margin: 0 0 5px 0; }
    .desc { font-size: 0.85rem; color: #666; margin: 0 0 15px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box { background: rgba(0,0,0,0.03); padding: 10px; border-radius: 12px; }
    .stat-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #888; display: block; margin-bottom: 2px;}
    .stat-val { font-size: 0.95rem; font-weight: 600; color: #222; font-family: monospace; }
    .stat-val span { font-size: 0.7rem; color: #888; font-weight: 400; }

    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-weight: 600; color: #333; background: white; padding: 10px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 2000;
    }
  </style>
</head>
